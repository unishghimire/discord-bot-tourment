services:
  - type: worker
    name: nexplay-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: BASE44_SERVICE_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: APP_ID
        value: 6a5226b5047f5c59d961130e
